<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>岡山県競売情報 PDF一覧</title>
  <style>
    :root { color-scheme: light dark; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; background: #f6f7fb; color: #1f2937; }
    main { max-width: 960px; margin: 0 auto; padding: 32px 16px 48px; }
    .hero { background: linear-gradient(135deg, #1d4ed8, #0891b2); color: white; border-radius: 20px; padding: 28px; box-shadow: 0 18px 40px rgb(15 23 42 / 18%); }
    h1 { margin: 0 0 8px; font-size: clamp(1.7rem, 4vw, 2.4rem); }
    .hero p { margin: 0; opacity: .92; }
    .nav { margin-top: 16px; display: flex; gap: 10px; flex-wrap: wrap; }
    .nav a { color: #1d4ed8; background: white; border-radius: 999px; padding: 8px 14px; text-decoration: none; font-weight: 700; }
    .panel { margin-top: 24px; background: white; border-radius: 16px; padding: 20px; box-shadow: 0 10px 28px rgb(15 23 42 / 10%); }
    .controls { display: grid; gap: 16px; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); align-items: end; }
    label { display: grid; gap: 6px; font-weight: 700; }
    input, select, button { font: inherit; border-radius: 10px; border: 1px solid #cbd5e1; padding: 10px 12px; }
    button { cursor: pointer; border: 0; background: #2563eb; color: white; font-weight: 700; }
    button:hover { background: #1d4ed8; }
    button:disabled { cursor: not-allowed; background: #94a3b8; }
    .status { margin-top: 16px; min-height: 1.5em; color: #475569; }
    .status.error { color: #b91c1c; }
    .meta { margin: 22px 0 12px; color: #475569; }
    .items { display: grid; gap: 12px; margin: 0; padding: 0; list-style: none; }
    .item { display: flex; gap: 14px; justify-content: space-between; align-items: center; border: 1px solid #e2e8f0; border-radius: 14px; padding: 14px; background: #fff; }
    .title { font-weight: 700; line-height: 1.5; }
    .download { white-space: nowrap; color: white; background: #059669; border-radius: 999px; padding: 8px 14px; text-decoration: none; font-weight: 700; }
    .download:hover { background: #047857; }
    @media (prefers-color-scheme: dark) {
      body { background: #0f172a; color: #e5e7eb; }
      .panel, .item { background: #111827; }
      .item { border-color: #334155; }
      input, select { background: #0f172a; color: #e5e7eb; border-color: #475569; }
      .status, .meta { color: #cbd5e1; }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <h1>岡山県競売情報 PDF一覧</h1>
      <p>年月と日付を選択して、R2に保存されたスクレイピング結果からPDFをダウンロードできます。</p>
      <nav class="nav" aria-label="ページ切り替え"><a href="/map.html">地図表示へ</a></nav>
    </section>

    <section class="panel" aria-labelledby="search-heading">
      <h2 id="search-heading">検索条件</h2>
      <div class="controls">
        <label>
          年月
          <input id="month" type="month" min="2020-01" />
        </label>
        <label>
          日付
          <select id="day"></select>
        </label>
        <button id="load" type="button">一覧を表示</button>
      </div>
      <p id="status" class="status" role="status" aria-live="polite"></p>
    </section>

    <section class="panel" aria-labelledby="results-heading">
      <h2 id="results-heading">PDF一覧</h2>
      <p id="meta" class="meta">年月と日付を選択してください。</p>
      <ul id="items" class="items"></ul>
    </section>
  </main>

  <script>
    const monthInput = document.querySelector('#month');
    const daySelect = document.querySelector('#day');
    const loadButton = document.querySelector('#load');
    const statusEl = document.querySelector('#status');
    const metaEl = document.querySelector('#meta');
    const itemsEl = document.querySelector('#items');

    function pad(value) { return String(value).padStart(2, '0'); }

    function setDefaultMonth() {
      const now = new Date();
      monthInput.value = `${now.getFullYear()}-${pad(now.getMonth() + 1)}`;
    }

    function populateDays() {
      const [year, month] = monthInput.value.split('-').map(Number);
      const selected = daySelect.value;
      daySelect.textContent = '';
      if (!year || !month) return;
      const daysInMonth = new Date(year, month, 0).getDate();
      for (let day = 1; day <= daysInMonth; day += 1) {
        const option = document.createElement('option');
        option.value = pad(day);
        option.textContent = `${day}日`;
        daySelect.append(option);
      }
      const today = new Date();
      const defaultDay = year === today.getFullYear() && month === today.getMonth() + 1 ? pad(today.getDate()) : '01';
      daySelect.value = selected && Number(selected) <= daysInMonth ? selected : defaultDay;
    }

    function selectedDate() {
      return `${monthInput.value}-${daySelect.value}`;
    }

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.classList.toggle('error', isError);
    }

    function renderItems(data) {
      itemsEl.textContent = '';
      const items = Array.isArray(data.items) ? data.items : [];
      metaEl.textContent = `${data.date} のPDF: ${items.length}件`;
      if (items.length === 0) {
        setStatus('この日付のPDFは登録されていません。');
        return;
      }
      for (const item of items) {
        const li = document.createElement('li');
        li.className = 'item';

        const title = document.createElement('span');
        title.className = 'title';
        title.textContent = item.title || '無題の物件';

        const link = document.createElement('a');
        link.className = 'download';
        link.href = `/api/pdf?key=${encodeURIComponent(item.pdf)}`;
        link.textContent = 'PDFダウンロード';
        link.download = '';

        li.append(title, link);
        itemsEl.append(li);
      }
      setStatus('一覧を取得しました。');
    }

    async function loadItems() {
      if (!monthInput.value || !daySelect.value) {
        setStatus('年月と日付を選択してください。', true);
        return;
      }
      loadButton.disabled = true;
      setStatus('読み込み中...');
      metaEl.textContent = '取得中です。';
      itemsEl.textContent = '';
      try {
        const response = await fetch(`/api/items?date=${encodeURIComponent(selectedDate())}`);
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(payload.error || `取得に失敗しました (${response.status})`);
        }
        renderItems(payload);
      } catch (error) {
        metaEl.textContent = '取得できませんでした。';
        setStatus(error.message, true);
      } finally {
        loadButton.disabled = false;
      }
    }

    monthInput.addEventListener('change', populateDays);
    loadButton.addEventListener('click', loadItems);
    setDefaultMonth();
    populateDays();
  </script>
</body>
</html>
